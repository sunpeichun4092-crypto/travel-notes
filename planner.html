<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能行程规划 · 漫游笔记</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    /* ================= Planner 专属样式 ================= */
    .planner-form {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 22px 26px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 22px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; }
    .field label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .field input,
    .field select {
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      background: #fff;
    }
    .field input:focus,
    .field select:focus { border-color: var(--color-primary); }

    /* 出发地分区 */
    .origin-block {
      background: linear-gradient(135deg, #fff8f3 0%, #ffffff 100%);
      border: 1px solid #ffe5d0;
      border-radius: var(--radius-md);
      padding: 18px 22px;
      margin-bottom: 16px;
    }
    .origin-block h3 {
      margin: 0 0 10px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .origin-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .origin-row input {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      outline: none;
      font-size: 14px;
    }
    .origin-row input:focus { border-color: var(--color-primary); }
    .origin-status {
      font-size: 13px;
      color: var(--color-muted);
      margin-top: 6px;
    }
    .origin-status.ok { color: #047857; }
    .origin-status.err { color: #b91c1c; }

    /* 签证按钮 */
    .visa-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .visa-pill {
      flex: 1;
      min-width: 70px;
      padding: 9px 8px;
      border-radius: 10px;
      border: 1px solid var(--color-border);
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }
    .visa-pill.active {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .submit-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .visa-tip {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    .visa-tip.show { display: block; }
    .visa-tip.green { background: #ecfdf5; color: #047857; }
    .visa-tip.amber { background: #fffbeb; color: #b45309; }
    .visa-tip.red { background: #fef2f2; color: #b91c1c; }

    /* 概览卡 */
    .result-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
    }
    .stat-card .label { font-size: 12px; color: var(--color-muted); }
    .stat-card .value { font-size: 20px; font-weight: 600; margin-top: 4px; }
    .stat-card .sub { font-size: 12px; color: var(--color-muted); margin-top: 2px; }

    /* 前往目的地交通区 */
    .travel-to {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 18px 22px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 18px;
    }
    .travel-to h3 {
      margin: 0 0 12px;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .transport-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .transport-card {
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 14px 16px;
      transition: var(--transition);
      background: #fff;
    }
    .transport-card.recommended {
      border-color: var(--color-primary);
      background: #fff8f3;
    }
    .transport-card .head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .transport-card .badge {
      background: var(--color-primary);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .transport-card p {
      font-size: 13px;
      color: var(--color-muted);
      margin: 4px 0 10px;
      line-height: 1.5;
    }
    .transport-card .booking-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .transport-card .booking-row a {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--color-text);
      transition: var(--transition);
    }
    .transport-card .booking-row a:hover {
      background: var(--color-primary);
      color: #fff;
    }

    /* 地图 + 当日行程 双栏 */
    .plan-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      align-items: flex-start;
    }
    .map-block {
      background: #fff;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: sticky;
      top: 80px;
    }
    .map-block .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .map-block .toolbar select {
      padding: 7px 10px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      background: #fff;
    }
    #leafletMap {
      width: 100%;
      height: 540px;
    }
    .map-legend {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--color-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
    }
    .map-legend .dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    /* 当日行程列表 */
    .days-wrap { display: flex; flex-direction: column; gap: 16px; }
    .day-block-plan {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 18px 22px;
      box-shadow: var(--shadow-sm);
    }
    .day-block-plan h3 {
      margin: 0 0 12px;
      font-size: 17px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .day-num {
      background: var(--color-primary);
      color: #fff;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .day-meta {
      font-size: 12px;
      color: var(--color-muted);
      font-weight: normal;
    }
    .item-row {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition);
    }
    .item-row:hover { background: #fff7ee; }
    .item-row.active {
      background: #fff3ec;
      box-shadow: inset 0 0 0 1px var(--color-primary);
    }
    .item-row + .item-row { border-top: 1px dashed #ececec; }
    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .icon-wrap.hotel { background: #eef2ff; color: #4f46e5; }
    .icon-wrap.food { background: #fef3c7; color: #b45309; }
    .icon-wrap.transport { background: #ecfdf5; color: #047857; }
    .icon-wrap.sight { background: #fff3ec; color: #ea580c; }
    .item-row .time { color: var(--color-muted); font-size: 12px; }
    .item-row .name { font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .item-row .marker-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      background: var(--color-primary);
      color: #fff;
    }
    .item-row .meta { font-size: 12px; color: var(--color-muted); margin-top: 2px; }
    .item-row .cost { font-size: 13px; color: #047857; white-space: nowrap; }
    .day-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .placeholder-result {
      background: #fff;
      border-radius: var(--radius-md);
      padding: 60px 24px;
      text-align: center;
      color: var(--color-muted);
      box-shadow: var(--shadow-sm);
    }
    .placeholder-result .emoji { font-size: 56px; margin-bottom: 8px; }

    /* 详情抽屉 */
    .drawer-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, .35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 80;
    }
    .drawer-mask.show { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 420px;
      max-width: 100vw;
      background: #fff;
      box-shadow: -10px 0 30px rgba(15, 23, 42, .12);
      transform: translateX(100%);
      transition: transform .25s;
      z-index: 90;
      display: flex;
      flex-direction: column;
    }
    .drawer.show { transform: translateX(0); }
    .drawer-header {
      padding: 18px 22px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-header h3 {
      margin: 0;
      font-size: 17px;
    }
    .drawer-body {
      padding: 18px 22px;
      overflow-y: auto;
      flex: 1;
    }
    .drawer-body .meta-line {
      display: flex; flex-wrap: wrap; gap: 6px;
      font-size: 12px;
      color: var(--color-muted);
      margin: 8px 0 14px;
    }
    .drawer-body .meta-line .pill {
      background: #f3f4f6;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .drawer-body p { line-height: 1.7; color: #374151; font-size: 14px; }
    .booking-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }
    .booking-section h4 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    .booking-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .booking-grid a {
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: 10px;
      text-align: center;
      font-size: 13px;
      transition: var(--transition);
      color: var(--color-text);
      background: #fff;
    }
    .booking-grid a:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }
    .close-btn {
      background: transparent;
      border: none;
      font-size: 22px;
      color: var(--color-muted);
    }
    .close-btn:hover { color: var(--color-primary); }

    /* Leaflet 自定义标记 */
    .num-marker {
      background: var(--color-primary);
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      border: 2px solid #fff;
    }
    .num-marker.hotel { background: #4f46e5; }
    .num-marker.food { background: #b45309; }
    .num-marker.origin { background: #047857; }
    .num-marker.dest { background: #2d6cdf; width:32px;height:32px;font-size:14px; }
    .num-marker.active {
      transform: scale(1.25);
      box-shadow: 0 4px 16px rgba(255,111,60,.5);
    }

    @media (max-width: 1100px) {
      .plan-layout { grid-template-columns: 1fr; }
      .map-block { position: static; }
      #leafletMap { height: 380px; }
    }
    @media (max-width: 960px) {
      .form-grid { grid-template-columns: repeat(2, 1fr); }
      .result-summary { grid-template-columns: repeat(2, 1fr); }
      .transport-cards { grid-template-columns: 1fr; }
    }
    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .result-summary { grid-template-columns: 1fr 1fr; }
      .item-row { grid-template-columns: 60px 1fr; }
      .item-row .cost { grid-column: 2; }
      .drawer { width: 100vw; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo"><span class="logo-mark"></span> 漫游笔记</a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="guides.html">攻略</a></li>
        <li><a href="destinations.html">目的地</a></li>
        <li><a href="planner.html">行程规划</a></li>
        <li><a href="tripmate.html" class="nav-tripmate">🌊 旅程伴侣</a></li>
        <li><a href="publish.html">发布攻略</a></li>
      </ul>
      <button class="menu-toggle" aria-label="菜单">☰</button>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <div class="section-title">
        <div>
          <h2>智能行程规划</h2>
          <p>从你的当前位置出发，自动安排去程交通 + 每日景点 / 餐饮 / 酒店，路线已最优化避免绕路。</p>
        </div>
      </div>

      <!-- 出发地（LBS） -->
      <div class="origin-block">
        <h3>📍 你从哪里出发？</h3>
        <div class="origin-row">
          <input id="originInput" type="text" placeholder="输入出发城市或地址（例如：北京 朝阳区）">
          <button class="btn btn-primary" type="button" onclick="locateMe()">📡 使用我的当前位置</button>
          <button class="btn btn-outline" type="button" onclick="resolveOriginInput()">🔍 解析输入位置</button>
        </div>
        <div id="originStatus" class="origin-status">尚未设置出发地。允许浏览器定位即可一键填充。</div>
      </div>

      <!-- 主表单 -->
      <form class="planner-form" id="plannerForm" onsubmit="generatePlan(event)">
        <div class="form-grid">
          <div class="field">
            <label>🌍 目的地选择</label>
            <select id="destSel" required></select>
          </div>
          <div class="field">
            <label>📅 旅行时间（出发日期）</label>
            <input id="startDate" type="date" required>
          </div>
          <div class="field">
            <label>⏳ 旅行天数</label>
            <input id="days" type="number" min="1" max="14" value="3" required>
          </div>
          <div class="field">
            <label>💰 人均预算（人民币）</label>
            <input id="budget" type="number" min="500" step="100" value="5000" required>
          </div>
        </div>

        <div class="field" style="margin-top:14px;">
          <label>🛂 是否需要签证</label>
          <div class="visa-pills" id="visaPills">
            <button type="button" class="visa-pill active" data-visa="any">不限制</button>
            <button type="button" class="visa-pill" data-visa="visa-free">仅免签</button>
            <button type="button" class="visa-pill" data-visa="landing">仅落地签</button>
            <button type="button" class="visa-pill" data-visa="visa">仅需签证</button>
          </div>
          <div id="visaTip" class="visa-tip"></div>
        </div>

        <div class="submit-row">
          <button class="btn btn-ghost" type="button" onclick="resetPlan()">🗑️ 重置</button>
          <button class="btn btn-primary" type="submit">✨ 生成智能行程</button>
        </div>
      </form>

      <!-- 结果区域 -->
      <div id="resultArea">
        <div class="placeholder-result">
          <div class="emoji">🧭</div>
          <h3 style="margin:6px 0;">先告诉我你的出发地，再生成行程</h3>
          <p>系统会先帮你规划去程交通（飞机/高铁/自驾），再生成每天最短路径的城内行程。</p>
        </div>
      </div>
    </div>
  </main>

  <!-- 详情抽屉 -->
  <div id="drawerMask" class="drawer-mask" onclick="closeDrawer()"></div>
  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h3 id="drawerTitle">详情</h3>
      <button class="close-btn" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <footer class="site-footer">
    <div class="container copyright">© 2026 漫游笔记 Demo</div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/planner.js"></script>
</body>
</html>
